name: Workflow rule gap
description: Report a missing or incorrect workflow validation rule.
title: "[workflow] "
labels:
  - workflow
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Please use synthetic examples only. Do not include customer names, credentials, database dumps, uploaded documents, or private screenshots.
  - type: dropdown
    id: domain
    attributes:
      label: Domain
      options:
        - Customs jobs
        - Declarations
        - Outsourced transport
        - Finance
        - Documents
        - Compliance
        - Multilingual terminology
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe the rule that should pass or fail.
    validations:
      required: true
  - type: textarea
    id: synthetic-example
    attributes:
      label: Synthetic example
      description: Provide a small fake workflow object or scenario.
      render: js
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: This report does not include private business data or credentials.
          required: true
